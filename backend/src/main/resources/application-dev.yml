# Override defaults for local development
micronaut:
  server:
    cors:
      enabled: true
      configurations:
        frontend:
          allowed-origins:
            - http://localhost:8080
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Authorization
          allow-credentials: true
          exposed-headers:
            - Authorization

azure:
  storage:
    cors-origin: "http://localhost:8081"

datasources:
  default:
    url: jdbc:sqlserver://localhost:1433;databaseName=kpnquest;encrypt=false
    username: sa
    password: ${SA_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
