aaaaaaaaaservices:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${SA_PASSWORD}" -No -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 9

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      - /opt/mssql-tools18/bin/sqlcmd
      - -S
      - db
      - -U
      - sa
      - -P
      - ${SA_PASSWORD}
      - -No
      - -Q
      - "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'kpnquest') CREATE DATABASE kpnquest"
    restart: "no"